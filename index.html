<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Memory Archive · 星空尽头</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <script>document.head.insertAdjacentHTML('beforeend','<link rel="stylesheet" href="style.css?v='+Date.now()+'">')</script>
</head>
<body>

  <canvas id="stars"></canvas>

  <div class="container">
    <h1 class="main-title fade-layer" style="animation-delay: 0.2s">Beyond the Stars</h1>
    <div class="title-divider" style="animation-delay: 0.35s">
      <span class="divider-line"></span>
      <span class="divider-dot">✦</span>
      <span class="divider-line"></span>
    </div>
  </div>

  <div class="btn-wrapper" style="animation: fadeIn 1.2s ease both; animation-delay: 0.9s">
    <button class="enter-btn" onclick="enterTransition()">
      <span class="btn-en">Enter</span>
      <span class="btn-cn">进入</span>
    </button>
  </div>

  <p class="sub">
    <span class="sub-en">Where every memory still shines</span>
    <span class="sub-cn">愿这里，成为回忆永不褪色的地方</span>
  </p>

  <script src="script.js"></script>
</body>
</html>
