<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>祁煜的回忆 · Memory Archive</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ====== 档案翻折 ====== */
    .archive-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 50px;
      perspective: 900px;
    }

    .folder-wrapper {
      position: relative;
      --card-w: min(440px, calc(100vw - 32px));
      width: var(--card-w);
    }

    /* 封面 */
    .folder-cover {
      position: relative;
      z-index: 5;
      width: 100%;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.75s cubic-bezier(0.22, 0.61, 0.36, 1),
                  opacity 0.35s ease 0.55s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .folder-cover.open {
      transform: rotateX(78deg);
      opacity: 0.08;
      cursor: default;
      pointer-events: none;
    }

    .flip-hint {
      text-align: center;
      margin-top: 6px;
      opacity: .35;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: #F8F6F2;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }
    .folder-cover.open ~ .flip-hint { opacity: 0; }

    /* 锚点缩略 — 祁煜粉光边框 */
    .anchor-thumb {
      position: absolute;
      top: -12px; left: 0;
      z-index: 18;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(-8px) scale(0.85);
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.55s,
                  transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.55s;
      cursor: pointer;
    }
    .folder-cover.open ~ .anchor-thumb {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .anchor-thumb:hover { transform: translateY(-2px) scale(1.03); }
    .anchor-thumb-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid rgba(255,190,215,.40);
      box-shadow:
        0 0 20px rgba(255,180,205,.30),
        0 0 40px rgba(255,165,195,.10),
        0 4px 12px rgba(10,8,30,.35);
      flex-shrink: 0;
    }
    .anchor-thumb-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
    }
    .anchor-thumb-info { display: flex; flex-direction: column; gap: 1px; }
    .anchor-thumb-name {
      font-family: "Noto Serif SC", serif;
      font-size: 14px; letter-spacing: 2px;
      color: rgba(248,220,235,.88);
      text-shadow: 0 0 10px rgba(255,180,205,.45);
    }
    .anchor-thumb-en {
      font-family: "Cormorant Garamond", serif;
      font-size: 11px; letter-spacing: 1.5px;
      color: rgba(220,200,210,.50);
    }
    .anchor-thumb-label {
      font-size: 10px; letter-spacing: 1px;
      color: rgba(255,180,205,.38);
    }

    /* 书脊投影 */
    .folder-shadow-bar {
      position: absolute;
      top: 8px; left: 5%; right: 5%;
      height: 40px;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(180deg,
        rgba(8,6,20,.55) 0%,
        rgba(8,6,20,.12) 70%,
        transparent 100%);
      border-radius: 50%;
      filter: blur(14px);
      transition: opacity 0.45s ease 0.3s;
    }
    .folder-cover.open ~ .folder-shadow-bar { opacity: 1; }

    /* 内容面板 — 统一深夜空底 + 顶部祁煜粉光渐变 */
    .folder-contents {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
      pointer-events: none;

      background:
        /* 玻璃星空反射 — 顶部亮白渐变 */
        linear-gradient(180deg, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 30%),
        /* 顶部祁煜粉光 — 轻轻洒入 */
        radial-gradient(ellipse at 50% 0%, rgba(255,195,215,.10) 0%, transparent 55%),
        /* 左上角柔光 */
        radial-gradient(ellipse at 20% 15%, rgba(255,185,210,.06) 0%, transparent 40%),
        /* 深邃夜空底 */
        linear-gradient(180deg, rgba(20,22,38,.94), rgba(14,16,30,.96)),
        /* 微妙横线纹理 */
        repeating-linear-gradient(0deg, transparent, transparent 32px,
          rgba(255,255,255,.015) 32px, rgba(255,255,255,.015) 33px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 0 0 22px 22px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.06),
        /* 边框粉光 — 祁煜色在边框上 */
        0 0 30px rgba(255,180,205,.06),
        0 20px 60px rgba(10,8,30,.50);
      padding: 52px 28px 30px;
    }
    .folder-cover.open ~ .folder-contents {
      opacity: 1; transform: translateY(0); pointer-events: auto;
    }

    /* 关闭按钮 */
    .folder-close-btn {
      position: absolute;
      top: 14px; right: 16px;
      width: 30px; height: 30px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 50%;
      color: rgba(200,190,205,.45);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: all 0.25s ease;
    }
    .folder-close-btn:hover {
      background: rgba(255,190,215,.08);
      border-color: rgba(255,180,205,.30);
      color: rgba(245,200,220,.80);
    }

    /* 分栏 */
    .archive-section { margin-bottom: 16px; }
    .archive-section:last-child { margin-bottom: 0; }
    .archive-section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .archive-section-icon {
      font-size: 15px;
      filter: drop-shadow(0 0 4px rgba(255,195,215,.35));
    }
    .archive-section-label {
      font-family: "Noto Serif SC", serif;
      font-size: 12px; font-weight: 400; letter-spacing: 2px;
      color: rgba(235,225,240,.78);
    }
    .archive-section-line {
      flex: 1; height: .5px;
      background: linear-gradient(90deg, rgba(255,195,215,.28), transparent);
    }
    .archive-items { display: flex; flex-wrap: wrap; gap: 5px; }
    .archive-item {
      padding: 7px 13px;
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 7px;
      font-size: 12px;
      color: rgba(210,200,215,.58);
      cursor: pointer;
      transition: all 0.25s ease;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      letter-spacing: 0.5px;
    }
    /* hover 才显祁煜粉 — 光是互动时才亮 */
    .archive-item:hover {
      background: rgba(255,195,215,.07);
      border-color: rgba(255,185,210,.28);
      color: rgba(248,215,232,.88);
      transform: translateY(-1px);
      box-shadow: 0 0 14px rgba(255,185,210,.10);
    }
    .archive-item .idx {
      font-family: "Cormorant Garamond", serif;
      font-size: 10px; opacity: .30; margin-right: 4px;
      color: rgba(200,190,210,.45);
    }
    .archive-item:hover .idx {
      color: rgba(255,195,215,.55);
    }
    .archive-add-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 5px 12px; margin-top: 5px;
      background: transparent;
      border: 1px dashed rgba(255,255,255,.10);
      border-radius: 16px;
      color: rgba(200,190,205,.42);
      font-size: 11px; cursor: pointer;
      transition: all 0.25s ease;
      font-family: inherit; letter-spacing: 1px;
    }
    .archive-add-btn:hover {
      border-color: rgba(255,185,210,.40);
      color: rgba(245,205,225,.78);
      background: rgba(255,195,215,.04);
    }
    .archive-divider {
      display: flex; align-items: center; gap: 8px;
      margin: 20px 0 13px;
    }
    .archive-divider-dot {
      width: 3px; height: 3px; border-radius: 50%;
      background: rgba(200,190,210,.25);
    }
    .archive-divider-label {
      font-family: "Cormorant Garamond", serif;
      font-size: 10px; letter-spacing: 2px;
      color: rgba(200,190,210,.25);
      text-transform: uppercase;
    }

    /* 合上按钮 */
    .back-to-cover {
      text-align: center; margin-top: 14px;
      opacity: 0;
      transition: opacity 0.4s ease 0.3s;
    }
    .folder-cover.open ~ .folder-contents .back-to-cover { opacity: 1; }
    .back-to-cover-btn {
      padding: 6px 16px;
      background: rgba(255,255,255,.02);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      color: rgba(200,190,210,.38);
      font-size: 11px; cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.25s ease;
    }
    .back-to-cover-btn:hover {
      background: rgba(255,195,215,.06);
      border-color: rgba(255,185,210,.25);
      color: rgba(245,210,228,.70);
    }
  </style>
</head>
<body data-character="qiyu" class="fade-in">

  <div class="top-bar">

      <button class="fullscreen-btn" id="fullscreenBtn" onclick="enterFullscreen()" style="display:none;">

        <span class="icon">♪</span><span class="label">ON</span>

  </div>
  <audio id="bgm"></audio>

  <div class="scaled-page">

          </div>

            <div class="archive-items">

            </div>

      </div><!-- /folder-wrapper -->

    </div><!-- /archive-stage -->

  </div><!-- /scaled-page -->

  <div class="modal-overlay" id="fragOverlay" onclick="if(event.target===this) closeFragment()">
    <div class="modal-box">
      <h3 class="modal-title"></h3>
      <p class="modal-text"></p>
      <button class="enter-btn small modal-close" onclick="closeFragment()">关闭</button>
    </div>
  </div>

  <script src="script.js?v=20260712d"></script>
  <script>
    var cover = document.getElementById('folderCover');
    var contents = document.querySelector('.folder-contents');
    var isOpen = false;
    var hideTimer = null;
    var closeTimer = null;

    function openFolder() {
      if (!cover || isOpen) return;
      if (closeTimer) clearTimeout(closeTimer);
      if (hideTimer) clearTimeout(hideTimer);
      isOpen = true;
      if (contents) {
        contents.style.transition = '';
        contents.style.opacity = '';
        contents.style.transform = '';
        contents.style.pointerEvents = '';
      }
      if (cover.style.display === 'none') {
        cover.classList.remove('open');
        cover.style.display = '';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            cover.classList.add('open');
            hideTimer = setTimeout(function() { cover.style.display = 'none'; }, 750);
          });
        });
      } else {
        cover.classList.add('open');
        hideTimer = setTimeout(function() { cover.style.display = 'none'; }, 750);
      }
    }

    function closeFolder() {
      if (!cover || !isOpen) return;
      if (hideTimer) clearTimeout(hideTimer);
      if (closeTimer) clearTimeout(closeTimer);
      isOpen = false;
      if (contents) {
        contents.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
        contents.style.opacity = '0';
        contents.style.transform = 'translateY(-12px)';
        contents.style.pointerEvents = 'none';
      }
      closeTimer = setTimeout(function() {
        if (contents) { contents.style.transition = ''; }
        cover.style.display = '';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { cover.classList.remove('open'); });
        });
      }, 350);
    }
  </script>

</body>
