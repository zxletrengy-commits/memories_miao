<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>黎深的回忆 · Memory Archive</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .archive-stage {
      display:flex;flex-direction:column;align-items:center;
      justify-content:flex-start;padding-top:50px;perspective:900px;
    }
    .folder-wrapper {
      position:relative;
      --card-w:min(380px, calc(100vw - 32px));
      width:var(--card-w);
}
    .memory-card .card-glass { --card-h:calc(var(--card-w) * 1.75); }

    .folder-cover {
      position:relative;z-index:5;width:100%;
      transform-origin:top center;transform-style:preserve-3d;
      transition:transform .75s cubic-bezier(.22,.61,.36,1), opacity .35s ease .55s;
      cursor:pointer;-webkit-tap-highlight-color:transparent;
    }
    .folder-cover.open { transform:rotateX(78deg);opacity:.08;cursor:default;pointer-events:none; }

    .flip-hint {
      text-align:center;margin-top:8px;font-size:13px;
      letter-spacing:2px;color:#F8F6F2;pointer-events:none;
      animation:flipHintBlink 2.8s ease-in-out infinite;
      transition:opacity .35s ease;
    }
    .folder-cover.open ~ .flip-hint { opacity:0; animation:none; }
    @keyframes flipHintBlink {
      0%,100%{opacity:.55}
      50%{opacity:.18}
    }

    .anchor-thumb {
      position:absolute;top:-26px;left:0;z-index:18;
      display:flex;align-items:center;gap:10px;
      opacity:0;transform:translateY(-8px) scale(.85);pointer-events:none;
      transition:opacity .15s ease, transform .15s ease;
    }
    .folder-cover.open ~ .anchor-thumb {
      opacity:1;transform:translateY(0) scale(1);pointer-events:auto;
      transition:opacity .5s cubic-bezier(.34,1.56,.64,1) .55s,
                transform .5s cubic-bezier(.34,1.56,.64,1) .55s;
    }
    .anchor-thumb-avatar {
      position:relative;width:52px;height:52px;border-radius:50%;overflow:hidden;
      border:1.5px solid rgba(180,210,245,.40);
      box-shadow:0 0 24px rgba(180,205,240,.35), 0 0 48px rgba(165,195,235,.14),
                 0 8px 20px rgba(10,8,30,.45), 0 0 0 1px rgba(255,255,255,.06);
      flex-shrink:0;cursor:pointer;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .anchor-thumb-avatar:hover { transform:translateY(-2px) scale(1.03); }
    .anchor-thumb-avatar::after {
      content:'↻';position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.35);color:rgba(255,255,255,.70);font-size:16px;
      opacity:0;transition:opacity .25s ease;pointer-events:none;border-radius:50%;
    }
    .anchor-thumb-avatar:hover::after { opacity:1; }
    .anchor-thumb-avatar img { width:100%;height:100%;object-fit:cover;object-position:center top; }
    .anchor-thumb-info { display:flex;flex-direction:column;gap:2px; padding-top:6px; }
    .anchor-thumb-name {
      font-family:"Noto Serif SC",serif;font-size:14px;letter-spacing:2px;
      color:rgba(220,235,252,.88);text-shadow:0 0 10px rgba(180,205,240,.45);
    }
    .anchor-thumb-en {
      font-family:"Cormorant Garamond",serif;font-size:11px;letter-spacing:1.5px;
      color:rgba(195,210,230,.50);
    }
    .anchor-info-row { display:flex;flex-wrap:wrap;gap:4px;margin-top:4px; }
    .anchor-info-tag {
      padding:2px 7px;font-size:9px;border-radius:4px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      color:rgba(205,212,222,.45);letter-spacing:.5px;white-space:nowrap;
    }
    .anchor-info-tag.highlight { color:rgba(185,218,248,.60);border-color:rgba(185,215,245,.15); }

    .folder-shadow-bar {
      position:absolute;top:8px;left:5%;right:5%;height:40px;z-index:2;pointer-events:none;
      opacity:0;border-radius:50%;filter:blur(14px);
      background:linear-gradient(180deg, rgba(8,6,20,.55) 0%, rgba(8,6,20,.12) 70%, transparent 100%);
      transition:opacity .45s ease .3s;
    }
    .folder-cover.open ~ .folder-shadow-bar { opacity:1; }

    .folder-contents {
      position:absolute;top:0;left:12px;right:12px;z-index:1;
      opacity:0;transform:translateY(-12px);
      transition:opacity .5s ease .45s, transform .5s ease .45s;
      pointer-events:none;overflow:hidden;
      backdrop-filter:blur(14px) saturate(130%) brightness(110%);
      -webkit-backdrop-filter:blur(14px) saturate(130%) brightness(110%);
      background:
        linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 26%),
        radial-gradient(ellipse at 22% 10%, rgba(185,218,248,.10) 0%, transparent 46%),
        radial-gradient(ellipse at 78% 88%, rgba(170,200,225,.04) 0%, transparent 50%),
        linear-gradient(180deg, rgba(17,19,36,.66), rgba(12,14,30,.70)),
        repeating-linear-gradient(0deg, transparent, transparent 28px,
          rgba(255,255,255,.010) 28px, rgba(255,255,255,.010) 29px),
        repeating-linear-gradient(22deg, transparent, transparent 2px,
          rgba(255,255,255,.006) 2px, rgba(255,255,255,0) 3px);
      border:1px solid rgba(255,255,255,.10);
      border-radius:0 0 22px 22px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 0 40px rgba(180,210,245,.04),
                 0 20px 60px rgba(10,8,30,.50);
      padding: 76px 24px 52px;
    }
    .folder-cover.open ~ .folder-contents { opacity:1;transform:translateY(0);pointer-events:auto; }

    .archive-section { margin-bottom:24px; }
    .archive-section:last-child { margin-bottom:0; }
    .archive-section-header { display:flex;align-items:center;gap:10px;margin-bottom:8px; }
    .archive-section-icon {
      font-size:15px;filter:drop-shadow(0 0 5px rgba(185,215,245,.50));
      transition:filter .35s ease;
    }
    .archive-section-label {
      font-family:"Noto Serif SC",serif;font-size:12px;font-weight:400;letter-spacing:2px;
      color:rgba(225,230,245,.78);
    }
    .archive-items { display:flex;flex-wrap:wrap;gap:5px; }
    .archive-item {
      padding:7px 13px;background:rgba(255,255,255,.018);
      border:1px solid rgba(255,255,255,.04);border-radius:7px;
      font-size:12px;color:rgba(200,208,218,.55);cursor:pointer;
      transition:all .3s cubic-bezier(.34,1.56,.64,1);
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:.5px;
    }
    .archive-item:hover {
      background:rgba(185,215,245,.06);border-color:rgba(180,210,245,.18);
      color:rgba(220,235,252,.88);transform:translateY(-2px) scale(1.03);
      box-shadow:0 4px 14px rgba(0,0,0,.18), 0 0 16px rgba(180,210,245,.08);
    }
    .archive-item .idx {
      font-family:"Cormorant Garamond",serif;font-size:10px;opacity:.30;margin-right:4px;
      color:rgba(195,205,220,.45);
    }
    .archive-item:hover .idx { color:rgba(185,215,245,.55); }
    .archive-add-btn {
      display:inline-flex;align-items:center;gap:4px;
      padding:5px 12px;margin-top:5px;background:transparent;
      border:1px dashed rgba(255,255,255,.10);border-radius:16px;
      color:rgba(195,205,220,.42);font-size:11px;cursor:pointer;
      transition:all .25s ease;font-family:inherit;letter-spacing:1px;
    }
    .archive-add-btn:hover {
      border-color:rgba(180,210,245,.40);color:rgba(210,230,250,.78);
      background:rgba(185,215,245,.04);
    }

    .archive-divider { display:flex;align-items:center;gap:10px;margin:30px 0 18px; }
    .archive-divider-dot { width:2px;height:2px;border-radius:50%;background:rgba(200,210,225,.20);flex-shrink:0; }
    .archive-divider-dot:nth-child(3) {
      width:3px;height:3px;background:rgba(185,215,245,.35);
      box-shadow:0 0 4px rgba(185,215,245,.20);
    }
    .archive-divider-line { flex:1;height:.5px;background:linear-gradient(90deg, transparent, rgba(200,210,225,.18), transparent); }

    .corner-star {
      position:absolute;top:6px;right:6px;z-index:10;pointer-events:none;
      opacity:0;transform:translateY(-6px);
      transition:opacity .45s ease .65s, transform .45s ease .65s;
    }
    .folder-cover.open ~ .folder-contents .corner-star { opacity:1;transform:translateY(0); }
    .corner-star svg {
      width:clamp(12px, calc(var(--card-w)*.028), 15px);
      height:clamp(12px, calc(var(--card-w)*.028), 15px);
      filter:drop-shadow(0 0 4px rgba(185,220,245,.80));
      animation:starBreathe 7s ease-in-out infinite;
    }
    @keyframes starBreathe {
      0%,100%{opacity:.65;filter:drop-shadow(0 0 3px rgba(185,220,245,.55))}
      40%{opacity:1;filter:drop-shadow(0 0 7px rgba(185,220,245,.95))}
      70%{opacity:.80;filter:drop-shadow(0 0 5px rgba(185,220,245,.70))}
    }
    .corner-star::before {
      content:'';position:absolute;
      top:50%;right:calc(clamp(12px, calc(var(--card-w)*.028), 15px) + 4px);
      transform:translateY(-50%);width:42px;height:.5px;
      background:linear-gradient(to left, rgba(210,235,255,.55), transparent);
      box-shadow:0 0 3px rgba(180,215,245,.30);
    }
    .corner-star::after {
      content:'';position:absolute;
      bottom:calc(-1*clamp(12px, calc(var(--card-w)*.028), 15px) - 14px);
      left:50%;transform:translateX(-50%);width:.5px;height:38px;
      background:linear-gradient(to bottom, rgba(210,235,255,.55), transparent);
      box-shadow:0 0 3px rgba(180,215,245,.30);
    }

    .back-to-cover {
      position:absolute;bottom:18px;left:0;right:0;
      text-align:center;opacity:0;transition:opacity .4s ease .3s;
    }
    .folder-cover.open ~ .folder-contents .back-to-cover { opacity:1; }
    .back-to-cover-btn {
      padding:6px 16px;background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.08);border-radius:14px;
      color:rgba(200,205,215,.38);font-size:11px;cursor:pointer;
      letter-spacing:1px;transition:all .25s ease;
    }
    .back-to-cover-btn:hover {
      background:rgba(185,215,245,.06);border-color:rgba(180,210,245,.25);
      color:rgba(215,230,248,.70);
    }
  </style>
</head>

  <script>
    var cover=document.getElementById('folderCover'),contents=document.querySelector('.folder-contents'),anchor=document.querySelector('.anchor-thumb');
    var isOpen=false,hideTimer=null,closeTimer=null;
    function openFolder(){
      if(!cover||isOpen)return;
      if(closeTimer)clearTimeout(closeTimer);if(hideTimer)clearTimeout(hideTimer);isOpen=true;
      if(contents){contents.style.transition='';contents.style.opacity='';contents.style.transform='';contents.style.pointerEvents='';}
      if(anchor){anchor.style.transition='';anchor.style.opacity='';anchor.style.transform='';}
      if(cover.style.visibility==='hidden'){
        cover.classList.remove('open');cover.style.visibility='';
        requestAnimationFrame(function(){requestAnimationFrame(function(){
          cover.classList.add('open');hideTimer=setTimeout(function(){cover.style.visibility='hidden';},750);
        });});
      }else{cover.classList.add('open');hideTimer=setTimeout(function(){cover.style.visibility='hidden';},750);}
    }
    function closeFolder(){
      if(!cover||!isOpen)return;
      if(hideTimer)clearTimeout(hideTimer);if(closeTimer)clearTimeout(closeTimer);isOpen=false;
      if(contents){contents.style.transition='opacity .35s ease, transform .35s ease';contents.style.opacity='0';contents.style.transform='translateY(-12px)';contents.style.pointerEvents='none';}
      if(anchor){anchor.style.transition='opacity .15s ease, transform .15s ease';anchor.style.opacity='0';anchor.style.transform='translateY(-8px) scale(.85)';anchor.style.pointerEvents='none';}
      closeTimer=setTimeout(function(){
        if(contents)contents.style.transition='';
        if(anchor)anchor.style.transition='';
        cover.style.visibility='';
        requestAnimationFrame(function(){requestAnimationFrame(function(){cover.classList.remove('open');});});
      },350);
    }
    var AVATAR_KEY='avatar-lishen',AVATAR_DEFAULT='assets/thing/Li 1.png?v=20260712';
    function triggerAvatarUpload(){document.getElementById('avatarInput').click();}
    function handleAvatarUpload(e){
      var f=e.target.files[0];if(!f)return;
      var r=new FileReader();r.onload=function(ev){
        var img=new Image();img.onload=function(){
          var c=document.createElement('canvas'),s=Math.min(1,300/img.width);
          c.width=img.width*s;c.height=img.height*s;
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          var d=c.toDataURL('image/jpeg',.75);
          try{localStorage.setItem(AVATAR_KEY,d);}catch(_){}
          applyAvatar(d);
        };img.src=ev.target.result;
      };r.readAsDataURL(f);e.target.value='';
    }
    function applyAvatar(s){var a=document.getElementById('anchorAvatar');if(a)a.src=s;}
    function resetAvatar(e){e.preventDefault();e.stopPropagation();try{localStorage.removeItem(AVATAR_KEY);}catch(_){}applyAvatar(AVATAR_DEFAULT);}
    (function(){try{var s=localStorage.getItem(AVATAR_KEY);if(s)applyAvatar(s);}catch(_){}})();
  </script>
