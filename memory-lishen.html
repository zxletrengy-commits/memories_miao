<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>黎深的回忆 · Memory Archive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-character="lishen" class="fade-in">

  <canvas id="stars"></canvas>

  <div class="top-bar">
    <button class="back-btn" onclick="goTo(cafeBackUrl)">BACK</button>
    <div class="top-bar-meta">
      <button class="fullscreen-btn" id="fullscreenBtn" onclick="enterFullscreen()" style="display:none;">
        <span class="icon">⛶</span>
      </button>
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
        <span class="icon">♪</span><span class="label">ON</span>
      </button>
    </div>
  </div>
  <audio id="bgm" src="assets/bgm.mp3" loop></audio>

  <div class="scaled-page">

    <!-- ====== 玻璃档案卡 ====== -->
    <div class="memory-card" data-char="lishen">
      <div class="card-glass">

        <!-- 星云背景 -->
        <div class="card-nebula"></div>

        <!-- 左上四角星 -->
        <svg class="card-star-tl" viewBox="0 0 28 28">
          <path d="M14 0l4 10 10 4-10 4-4 10-4-10L0 14l10-4z" fill="rgba(255,255,255,.80)"/>
          <path d="M14 2l3.2 8.2 8.8 3.8-8.8 3.2L14 26l-3.2-8.8L2 14l8.8-3.8z" fill="rgba(255,255,255,.35)"/>
        </svg>

        <!-- 人物立绘 -->
        <div class="card-portrait">
          <img src="assets/thing/Li 1.png?v=20260712" alt="黎深">
          <div class="card-portrait-bloom"></div>
          <div class="card-backlight"></div>
        </div>

        <!-- 文字叠加层 -->
        <div class="card-text-overlay">
          <h1 class="card-name-cn">黎深</h1>
          <span class="card-name-en">Zayne</span>
          <p class="card-quote">"无论未来多么深邃，<br>我都会在你身边。"</p>
        </div>

        <!-- 底部装饰线 -->
        <div class="card-divider">
          <span class="card-divider-line"></span>
          <span class="card-divider-star-wrap">
            <span class="card-divider-star-glow"></span>
            <span class="card-divider-star"></span>
          </span>
          <span class="card-divider-line"></span>
        </div>

        </div>

      </div>
    </div>

    <!-- 碎片卡片 -->
    <div class="fragment-grid">
      <div class="fragment" onclick="openFragment(this)"
           data-title="第一次相遇"
           data-text="在这里写下你们第一次相遇的场景和台词。">
        <div class="icon">✦</div>
        <div class="frag-title">第一次相遇</div>
      </div>
      <div class="fragment" onclick="openFragment(this)"
           data-title="雪山的约定"
           data-text="在这里写下你印象最深的一段剧情。">
        <div class="icon">✦</div>
        <div class="frag-title">雪山的约定</div>
      </div>
      <div class="fragment" onclick="openFragment(this)"
           data-title="专属语音"
           data-text="在这里粘贴你最喜欢的一句专属语音文本。">
        <div class="icon">✦</div>
        <div class="frag-title">专属语音</div>
      </div>
      <div class="fragment" onclick="openFragment(this)"
           data-title="写给他的话"
           data-text="在这里写下你想对他说的话。">
        <div class="icon">✦</div>
        <div class="frag-title">写给他的话</div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="fragOverlay" onclick="if(event.target===this) closeFragment()">
    <div class="modal-box">
      <h3 class="modal-title"></h3>
      <p class="modal-text"></p>
      <button class="enter-btn small modal-close" onclick="closeFragment()">关闭</button>
    </div>
  </div>

  <script src="script.js?v=20260712d"></script>
</body>
</html>
