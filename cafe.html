<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>喵喵屋 · Memory Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260713c">
</head>
<body class="cafe-body fade-in">

  <!-- 顶部栏 -->
  <div class="top-bar cafe-top-bar">
    <button class="back-btn" onclick="goTo('select.html')">BACK</button>
    <!-- 时间框绝对居中 -->
    <span class="cafe-time top-bar-time" id="cafeTime">--:--</span>
    <div class="top-bar-meta">
      <button class="fullscreen-btn" id="fullscreenBtn" onclick="enterFullscreen()" style="display:none;">
        <span class="icon">⛶</span>
      </button>
      <button class="music-btn" id="musicBtn" onclick="UIManager.togglePlaylist()">
        <span class="icon">♪</span>
        <span class="label">ON</span>
      </button>
    </div>
  </div>

  <!-- 歌单弹出层 -->
  <div class="playlist-overlay" id="playlistOverlay" onclick="if(event.target===this) UIManager.closePlaylist()">
    <div class="playlist-panel" id="playlistPanel">
      <div class="playlist-header">
        <span class="playlist-hd-line"></span>
        <span class="playlist-hd-icon">✦</span>
        <span class="playlist-hd-line"></span>
      </div>
      <div class="playlist-title-group">
        <h3 class="playlist-title-cn">喵咪留声机</h3>
        <span class="playlist-title-en" id="playlistTitleEn">Playlist</span>
      </div>
      <!-- 漂浮粒子 -->
      <span class="pl-dust d1"></span>
      <span class="pl-dust d2"></span>
      <span class="pl-dust d3"></span>
      <span class="pl-dust d4"></span>
      <span class="pl-dust d5"></span>
      <span class="pl-dust d6"></span>
      <span class="pl-dust d7"></span>
      <span class="pl-dust d8"></span>
      <span class="pl-dust d9"></span>
      <span class="pl-dust d10"></span>

      <div class="playlist-list" id="playlistList"></div>
    </div>
  </div>

  <audio id="bgm"></audio>
  
  <!-- ====== 喵喵屋场景 ====== -->
  <div class="cafe-scene" id="cafeScene">

    <!-- 场景背景层（真图） -->
    <div class="cafe-bg" id="cafeBg">
      <!-- 背景图片由JS根据时间切换 -->
      <div class="bg-image-layer" id="bgImageLayer"></div>
      
      <!-- 雨窗叠加效果 -->
      <div class="rain-overlay" id="rainOverlay" style="display:none;"></div>

      <!-- 浮尘效果（极淡，全屏） -->
      <div class="dust-particles" id="dustParticles"></div>
      
      <!-- 太阳光晕（二楼暖光斑） -->
      <div class="sun-glow" id="sunGlow"></div>

      <!-- 白天背景视频 -->
      <video class="bg-video-layer" id="bgVideoLayer" src="assets/cafe_alot/background/day.mp4" autoplay loop muted playsinline style="display:none;"></video>
      
      <!-- 接待区装饰层（透明底PNG） -->
      <img class="lobby-decoration" src="assets/cafe_alot/background/接待区（1）.png" alt="接待区" style="left:50%; bottom:0; height:auto; transform:translateX(-50%); top:auto;">
    </div>

    <!-- 拖拽热区（四个功能区） -->
    <div class="drop-zones" id="dropZones">
      <!-- 休息区 -->
      <div class="drop-zone" data-zone="sleep" style="left:22%; top:16%; width:36%; height:22%;">
        <span class="zone-label">休息区</span>
      </div>
      <!-- 娱乐区 -->
      <div class="drop-zone" data-zone="plant" style="left:50%; top:42%; width:32%; height:28%;">
        <span class="zone-label">娱乐区</span>
      </div>
      <!-- 清洁区 -->
      <div class="drop-zone" data-zone="clean" style="left:18%; top:48%; width:30%; height:17%;">
        <span class="zone-label">清洁区</span>
      </div>
      <!-- 放松区 -->
      <div class="drop-zone" data-zone="relax" style="left:10%; top:66%; width:40%; height:19%;">
        <span class="zone-label">放松区</span>
      </div>
      <!-- 接待区 -->
      <div class="drop-zone" data-zone="lobby" style="left:8%; top:85%; width:84%; height:15%;">
        <span class="zone-label">接待区</span>
      </div>
    </div>

    <!-- 角色锚点容器 -->
    <div class="char-layer" id="charLayer"></div>

    <!-- 对话气泡层 -->
    <div class="bubble-layer" id="bubbleLayer"></div>
  </div>

  <script src="script.js?v=20260713"></script>

  <!-- World 全局状态 -->
  <script src="core/world.js"></script>

  <!-- 角色数据（file://协议兼容） -->
  <script src="data/characters-inline.js"></script>

  <!-- Managers -->
  <script src="core/managers/SceneManager.js?v=20260712"></script>
  <script src="core/managers/UIManager.js?v=20260714"></script>
  <script src="core/managers/MemoryManager.js"></script>
  <script src="core/managers/CharacterPixel.js"></script>
  <script src="core/managers/CharacterManager.js"></script>

  <script src="editor-mode.js"></script>
  <script>
    // 初始化喵喵屋
    document.addEventListener('DOMContentLoaded', async () => {
      World.setScene('cafe');

      // 解析角色参数
      const charParam = new URLSearchParams(window.location.search).get('char') || 'qiyu';
      const charKeys  = charParam === 'both' ? ['qiyu', 'lishen'] : [charParam];

      // 初始化各 Manager
      SceneManager.init();
      MemoryManager.init();
      await CharacterManager.init(charKeys);

      // 点击空白处收起图标
      document.getElementById('cafeScene').addEventListener('click', (e) => {
        if (!e.target.closest('.chibi-sprite') &&
            !e.target.closest('.action-icons') &&
            !e.target.closest('.drop-zone')) {
          UIManager.closeAllIcons();
        }
      });

      // 手机端显示全屏按钮
      if (/Mobi|Android/i.test(navigator.userAgent) || window.innerWidth <= 768) {
        document.getElementById('fullscreenBtn').style.display = 'inline-flex';
        // 已经全屏则隐藏按钮
        document.addEventListener('fullscreenchange', () => {
          document.getElementById('fullscreenBtn').style.display =
            document.fullscreenElement ? 'none' : 'inline-flex';
        });
        document.addEventListener('webkitfullscreenchange', () => {
          document.getElementById('fullscreenBtn').style.display =
            document.webkitFullscreenElement ? 'none' : 'inline-flex';
        });
      }
    });
  </script>

  <!-- 占位弹窗 -->
  <div class="modal-overlay" id="placeholderOverlay" onclick="if(event.target===this) UIManager.closePlaceholder()">
    <div class="modal-box">
      <h3 class="modal-title" id="placeholderTitle"></h3>
      <p class="modal-text" id="placeholderText"></p>
      <button class="enter-btn small modal-close" onclick="UIManager.closePlaceholder()">好，我等 ✨</button>
    </div>
  </div>
</body>
</html>
